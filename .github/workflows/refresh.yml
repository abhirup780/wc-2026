name: Refresh data

on:
  schedule:
    # Check every 15 min. The job exits early unless a match result changed or the
    # cached odds are stale (>7.5h), so it re-sims after every match but only hits
    # the Odds API ~3×/day (~180 requests/month, within the free 500 tier).
    - cron: '*/15 * * * *'
  workflow_dispatch:   # manual trigger
  push:
    branches: [master]
    paths:
      - 'job/**'
      - 'shared/**'

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Persist the gathered odds across runs (private cache, not redistributed)
      # so match-driven re-sims reuse them without calling the Odds API.
      - name: Restore odds cache
        uses: actions/cache@v4
        with:
          path: job/.cache
          key: odds-${{ github.run_id }}
          restore-keys: odds-

      - name: Install dependencies
        run: npm ci

      - name: Run simulation job
        env:
          SIM_COUNT: '50000'
          MODEL_TYPE: 'poisson'
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          ODDS_TTL_HOURS: '7.5'
          BLEND_ODDS_WEIGHT: '0.3'
          OUTRIGHT_ODDS_WEIGHT: '0.3'
          KO_GOALS_MULTIPLIER: '0.85'
          FORM_VOLATILITY: '0.05'
          # 1.0 = no regression. FIFA points are already a compressed scale, so
          # shrinking toward the mean over-flattens the field and manufactures upsets.
          ELO_REGRESSION: '1.0'
        run: npm run simulate

      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet frontend/public/data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated JSON artifacts
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "wc2026-bot"
          git config user.email "wc2026-bot@github"
          git add frontend/public/data/
          git commit -m "chore: refresh data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

  # Deployment is handled by Vercel, which auto-deploys on every push to master.
