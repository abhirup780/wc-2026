name: Refresh data

on:
  schedule:
    # 4×/day (every 6h at 00:00, 06:00, 12:00, 18:00 UTC). Keeps the free Odds API
    # tier (500 req/month) within budget: ~2 requests/run × 4 × 30 ≈ 240/month.
    - cron: '0 */6 * * *'
  workflow_dispatch:   # manual trigger
  push:
    branches: [master]
    paths:
      - 'job/**'
      - 'shared/**'

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run simulation job
        env:
          SIM_COUNT: '50000'
          MODEL_TYPE: 'poisson'
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          BLEND_ODDS_WEIGHT: '0.6'
          OUTRIGHT_ODDS_WEIGHT: '0.6'
          KO_GOALS_MULTIPLIER: '0.85'
          FORM_VOLATILITY: '0.05'
          # 1.0 = no regression. FIFA points are already a compressed scale, so
          # shrinking toward the mean over-flattens the field and manufactures upsets.
          ELO_REGRESSION: '1.0'
        run: npm run simulate

      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet frontend/public/data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated JSON artifacts
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "wc2026-bot"
          git config user.email "wc2026-bot@github"
          git add frontend/public/data/
          git commit -m "chore: refresh data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

  # Deployment is handled by Vercel, which auto-deploys on every push to master.
